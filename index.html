<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mighty Sound — WorkBoard</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&family=Barlow+Condensed:wght@500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%}
body{font-family:'Barlow',sans-serif;background:#f0f0f0;color:#111;overflow:hidden}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(0,0,0,.18);border-radius:3px}
input,select,textarea,button{font-family:'Barlow',sans-serif}
.app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR — dark brand */
.sidebar{width:230px;flex-shrink:0;background:#0f0f0f;border-right:1px solid #222;display:flex;flex-direction:column;overflow:hidden}
.sb-logo{padding:16px 15px 12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #222}
.sb-logo-icon{width:32px;height:32px;background:#fff;border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-logo-icon svg{width:20px;height:20px}
.sb-logo-text{display:flex;flex-direction:column}
.sb-logo-brand{font-size:13px;font-weight:800;color:#fff;letter-spacing:.04em;text-transform:uppercase;line-height:1.1}
.sb-logo-sub{font-size:9px;font-weight:600;color:rgba(255,255,255,.3);letter-spacing:.12em;text-transform:uppercase;margin-top:1px}
.sb-section{padding:12px 14px 4px;font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.22)}
.sb-item{display:flex;align-items:center;gap:9px;padding:7px 11px;margin:1px 6px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:500;color:rgba(255,255,255,.48);transition:all .13s;user-select:none}
.sb-item:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.85)}
.sb-item.active{background:rgba(255,255,255,.12);color:#fff}
.sb-icon{font-size:13px;width:17px;text-align:center;flex-shrink:0}
.sb-add{display:flex;align-items:center;gap:9px;padding:7px 11px;margin:1px 6px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:500;color:rgba(255,255,255,.24);transition:all .13s}
.sb-add:hover{color:rgba(255,255,255,.55);background:rgba(255,255,255,.05)}
.sb-scroll{flex:1;overflow-y:auto;padding-bottom:8px}
.sb-footer{padding:12px 14px;border-top:1px solid #222;display:flex;align-items:center;gap:9px}
.user-av{width:30px;height:30px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#000;flex-shrink:0}
.sb-badge{font-size:9px;font-weight:700;background:rgba(255,255,255,.12);color:rgba(255,255,255,.6);padding:2px 6px;border-radius:4px;margin-left:auto;letter-spacing:.04em;text-transform:uppercase}
.sb-badge.new{background:rgba(255,200,50,.15);color:rgba(255,200,50,.8)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#f0f0f0;position:relative}
.board-header{padding:18px 22px 0;flex-shrink:0;background:#f0f0f0}
.board-title{font-size:22px;font-weight:800;color:#111;display:flex;align-items:center;gap:10px;margin-bottom:12px;letter-spacing:-.4px;line-height:1}
.bcount{font-size:13px;color:#888;font-weight:500}
.toolbar{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.view-btn{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;transition:all .13s;background:transparent;color:#666;letter-spacing:.02em}
.view-btn:hover{background:rgba(0,0,0,.07);color:#111}
.view-btn.active{background:#111;color:#fff}
.t-sep{width:1px;height:18px;background:#ddd;margin:0 3px}
.t-btn{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:6px;border:1px solid #d5d5d5;cursor:pointer;font-size:12px;font-weight:600;background:#fff;color:#444;transition:all .13s}
.t-btn:hover{border-color:#aaa;color:#111}
.t-btn.hi{background:#111;border-color:#111;color:#fff}
.t-btn.hi:hover{background:#333;border-color:#333}
.hdr-div{border:none;border-top:1px solid #e0e0e0;margin-top:12px}
.board-content{flex:1;overflow:auto;padding:16px 22px 60px}

/* TABLE */
.group-block{margin-bottom:20px}
.group-header{display:flex;align-items:center;gap:8px;padding:5px 0 7px;cursor:pointer;user-select:none}
.g-chev{font-size:9px;color:#aaa;transition:transform .18s;flex-shrink:0}
.g-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.g-name{font-size:14px;font-weight:700;color:#111}
.g-cnt{font-size:11px;color:#aaa;font-weight:500}
.tbl-wrap{border-radius:8px;overflow:hidden;border:1px solid #e0e0e0;background:#fff}
.tbl-head{display:flex;background:#f8f8f8;border-bottom:1px solid #e8e8e8}
.th{padding:8px 10px;font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#999;border-right:1px solid #ededed;white-space:nowrap;user-select:none}
.th-name{flex:0 0 225px}.th-col{flex:0 0 130px;text-align:center}
.th-add{padding:8px 12px;font-size:11px;color:#bbb;cursor:pointer;white-space:nowrap}.th-add:hover{color:#555}
.tbl-row{display:flex;background:#fff;border-bottom:1px solid #f0f0f0;transition:background .1s}
.tbl-row:hover{background:#fafafa}.tbl-row:last-child{border-bottom:none}
.td-name{flex:0 0 225px;padding:0 10px;display:flex;align-items:center;gap:7px;border-right:1px solid #ededed;cursor:pointer;min-height:38px}
.td-nm-txt{font-size:13px;color:#222;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:8px 0;font-weight:500}
.td-nm-txt:hover{color:#000}
.td-col{flex:0 0 130px;padding:0 8px;display:flex;align-items:center;justify-content:center;border-right:1px solid #ededed;min-height:38px}
.add-row{display:flex;background:#fafafa;border-top:1px solid #f0f0f0}
.add-row-btn{padding:8px 11px;font-size:12px;color:#bbb;cursor:pointer;display:flex;align-items:center;gap:5px;flex:1;transition:color .13s;font-weight:600}
.add-row-btn:hover{color:#555}
.sum-row{display:flex;flex-wrap:wrap;gap:18px;padding:7px 12px;background:#f8f8f8;border-top:1px solid #ededed;font-size:11px;color:#aaa;font-weight:500}
.sum-row b{font-weight:700;color:#555;font-family:'DM Mono',monospace}

/* CELLS */
.sbadge{display:inline-flex;align-items:center;justify-content:center;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;min-width:88px;text-align:center}
.sbadge:hover{opacity:.85}
.pchip{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:#444;cursor:pointer;font-weight:500}
.pav{border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;flex-shrink:0}
.dcell{font-size:12px;color:#555;cursor:pointer;white-space:nowrap;font-weight:500}.dcell:hover{color:#111}
.ncell{font-size:13px;color:#333;font-family:'DM Mono',monospace;cursor:pointer;font-weight:500}.ncell:hover{color:#111}
.tcell{font-size:12px;color:#555;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:114px;font-weight:500}.tcell:hover{color:#111}
.muted{color:#ccc!important}
.ii{background:#fff;border:1.5px solid #111;border-radius:4px;padding:3px 7px;color:#111;font-size:12px;outline:none;font-weight:500}
.ni{background:#fff;border:1.5px solid #111;border-radius:4px;padding:3px 6px;color:#111;font-size:13px;outline:none;flex:1;font-weight:600}
.pop{position:absolute;background:#fff;border:1px solid #ddd;border-radius:8px;padding:6px;z-index:250;box-shadow:0 6px 24px rgba(0,0,0,.14);min-width:158px}
.pop-item{display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:5px;cursor:pointer;font-size:12px;color:#333;font-weight:500;transition:background .1s}
.pop-item:hover{background:#f5f5f5}
.pop-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}

/* KANBAN */
.kb{display:flex;gap:14px;padding:4px 0 20px;overflow-x:auto;min-height:350px}
.kb-col{flex:0 0 250px;display:flex;flex-direction:column;gap:7px}
.kb-col-h{display:flex;align-items:center;gap:7px;padding:6px 3px}
.kb-ct{font-size:12px;font-weight:700;color:#333}
.kb-cnt{font-size:11px;color:#aaa;background:#e8e8e8;padding:1px 7px;border-radius:10px;font-weight:600}
.kb-card{background:#fff;border:1px solid #e5e5e5;border-radius:8px;padding:11px 12px;cursor:pointer;transition:all .14s}
.kb-card:hover{border-color:#aaa;transform:translateY(-1px);box-shadow:0 3px 12px rgba(0,0,0,.07)}
.kb-ctitle{font-size:13px;color:#222;font-weight:600;margin-bottom:7px;line-height:1.4}
.kb-meta{display:flex;align-items:center;justify-content:space-between}
.kb-date{font-size:11px;color:#aaa;font-weight:500}
.kb-empty{font-size:12px;color:#ccc;padding:8px 4px;text-align:center;border:1px dashed #ddd;border-radius:7px}

/* CALENDAR */
.cal-nav{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.cal-nav-btn{background:#fff;border:1px solid #ddd;border-radius:6px;padding:5px 12px;color:#555;cursor:pointer;font-size:13px;font-weight:600;transition:all .13s}
.cal-nav-btn:hover{background:#111;border-color:#111;color:#fff}
.cal-month{font-size:18px;font-weight:800;color:#111;min-width:180px;text-align:center;letter-spacing:-.3px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:#ddd;border:1px solid #ddd;border-radius:9px;overflow:hidden}
.cal-day-hdr{background:#f8f8f8;padding:7px 4px;text-align:center;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#888}
.cal-cell{background:#fff;min-height:100px;padding:6px;transition:background .1s}
.cal-cell:hover{background:#fafafa}
.cal-cell.today{background:#fffbf0}
.cal-cell.other-month{background:#f8f8f8}
.cal-date{font-size:12px;font-weight:600;color:#bbb;margin-bottom:4px}
.cal-date.today-num{color:#111;font-weight:800}
.cal-chip{font-size:11px;padding:2px 6px;border-radius:3px;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;display:block;font-weight:600}
.cal-chip:hover{opacity:.8}
.cal-more{font-size:10px;color:#aaa;margin-top:2px;cursor:pointer;font-weight:600}

/* BOARD GANTT */
.gantt-wrap{border-radius:8px;overflow:hidden;border:1px solid #e0e0e0;background:#fff}
.gantt-head{display:flex;border-bottom:1px solid #e8e8e8;background:#f8f8f8}
.gantt-label-col{flex:0 0 210px;padding:8px 12px;font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#999;border-right:1px solid #ededed;flex-shrink:0}
.gantt-week{flex:0 0 112px;padding:8px 6px;font-size:10px;color:#999;border-right:1px solid #ededed;text-align:center;white-space:nowrap;font-weight:600}
.gantt-row{display:flex;border-bottom:1px solid #f2f2f2;background:#fff;min-height:34px}
.gantt-row:hover{background:#fafafa}
.gantt-row-label{flex:0 0 210px;padding:0 12px;display:flex;align-items:center;font-size:12px;color:#444;border-right:1px solid #ededed;flex-shrink:0;cursor:pointer;font-weight:500}
.gantt-row-label:hover{color:#111}
.gantt-timeline{flex:1;position:relative;min-height:34px;overflow:hidden}
.gantt-bar{position:absolute;top:7px;height:20px;border-radius:4px;display:flex;align-items:center;padding:0 7px;font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;cursor:pointer;transition:opacity .14s}
.gantt-bar:hover{opacity:.8}
.gantt-today-line{position:absolute;top:0;bottom:0;width:2px;background:rgba(200,50,50,.5);pointer-events:none;z-index:5}
.gantt-grp-hdr{display:flex;background:#f8f8f8;border-bottom:1px solid #ededed}
.gantt-grp-label{flex:0 0 210px;padding:5px 12px;font-size:11px;font-weight:700;color:#888;border-right:1px solid #ededed}

/* ── MASTER GANTT SCHEDULER ── */
.mg-wrap{display:flex;flex-direction:column;background:#f0f0f0;min-height:0;flex:1}
.mg-toolbar{display:flex;align-items:center;gap:8px;padding:0 0 14px;flex-wrap:wrap;flex-shrink:0}
.mg-conflict-banner{background:#fff3cd;border:1px solid #ffc107;border-radius:7px;padding:9px 14px;margin-bottom:14px;display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:#856404;flex-shrink:0}
.mg-conflict-banner .resolve-btn{margin-left:auto;background:#856404;border:none;border-radius:5px;padding:4px 12px;color:#fff;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:.03em;text-transform:uppercase}
.mg-gantt-container{flex:1;overflow:auto;background:#fff;border-radius:9px;border:1px solid #e0e0e0;min-height:0}
.mg-head-sticky{position:sticky;top:0;z-index:20;background:#f5f5f5;border-bottom:1px solid #ddd}
.mg-head-row{display:flex}
.mg-left-header{flex:0 0 220px;padding:8px 12px;background:#f5f5f5;border-right:1px solid #ddd;font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#999;flex-shrink:0}
.mg-day-cell{flex-shrink:0;border-right:1px solid #e8e8e8;text-align:center;background:#f5f5f5}
.mg-day-cell.weekend{background:#fff5f5}
.mg-day-top{font-size:9px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.05em;padding:4px 0 0}
.mg-day-num{font-size:14px;font-weight:800;color:#333;line-height:1;padding-bottom:4px}
.mg-day-num.today-num{color:#c00;background:#ffeeee;border-radius:4px;padding:0 4px}
.mg-project-row{display:flex;background:#1a1a1a;min-height:34px;border-bottom:1px solid #333;cursor:pointer;user-select:none}
.mg-project-label{flex:0 0 220px;padding:0 10px 0 12px;display:flex;align-items:center;gap:8px;border-right:1px solid #333;flex-shrink:0}
.mg-project-name{font-size:12px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:.04em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mg-project-code{font-size:9px;font-weight:700;color:rgba(255,255,255,.4);letter-spacing:.07em;flex-shrink:0}
.mg-project-timeline{flex:1;background:#111}
.mg-ep-row{display:flex;background:#f8f8f8;min-height:28px;border-bottom:1px solid #eee;cursor:pointer;user-select:none}
.mg-ep-label{flex:0 0 220px;padding:0 10px 0 22px;display:flex;align-items:center;gap:6px;border-right:1px solid #e5e5e5;flex-shrink:0}
.mg-ep-name{font-size:11px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.06em}
.mg-ep-dates{font-size:10px;color:#aaa;font-weight:500}
.mg-ep-timeline{flex:1;position:relative;background:#f8f8f8}
.mg-ep-spine{position:absolute;top:10px;height:8px;border-radius:3px;background:rgba(0,0,0,.06);border:1px solid rgba(0,0,0,.1)}
.mg-task-row{display:flex;background:#fff;min-height:30px;border-bottom:1px solid #f5f5f5}
.mg-task-row:hover{background:#fafafa}
.mg-task-label{flex:0 0 220px;padding:0 10px 0 28px;display:flex;align-items:center;gap:8px;border-right:1px solid #ededed;flex-shrink:0}
.mg-task-name{font-size:12px;font-weight:600;color:#333;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mg-task-eng{font-size:10px;font-weight:600;margin-left:auto;padding-right:4px;flex-shrink:0}
.mg-task-timeline{flex:1;position:relative;min-height:30px}
.mg-task-bar{position:absolute;top:5px;height:20px;border-radius:4px;display:flex;align-items:center;overflow:hidden;cursor:pointer;transition:opacity .13s}
.mg-task-bar:hover{opacity:.8;box-shadow:0 2px 8px rgba(0,0,0,.18)}
.mg-bar-bg{position:absolute;inset:0;border-radius:4px;opacity:.85}
.mg-bar-content{position:relative;display:flex;align-items:center;gap:4px;padding:0 6px;width:100%;overflow:hidden}
.mg-bar-abbr{font-size:10px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.mg-bar-eng{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:800;background:rgba(255,255,255,.35);flex-shrink:0;color:inherit}
.mg-bar-edit{width:16px;height:16px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;background:rgba(255,255,255,.35);flex-shrink:0;cursor:pointer;flex-shrink:0}
.mg-today-line{position:absolute;top:0;bottom:0;width:2px;background:rgba(200,0,0,.4);pointer-events:none;z-index:8}
.mg-weekend-col{background:rgba(255,0,0,.018);position:absolute;top:0;bottom:0;pointer-events:none}
.mg-nav-btn{background:#fff;border:1px solid #ddd;border-radius:6px;padding:5px 12px;color:#555;cursor:pointer;font-size:12px;font-weight:700;transition:all .13s}
.mg-nav-btn:hover{background:#111;border-color:#111;color:#fff}
.mg-date-range{font-size:13px;color:#555;font-weight:600}
.mg-view-toggle{display:flex;gap:4px}
.mg-vtab{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid #ddd;background:#fff;color:#666;transition:all .13s}
.mg-vtab.active{background:#111;border-color:#111;color:#fff}

/* DETAIL PANEL */
.overlay{position:absolute;inset:0;background:rgba(0,0,0,.35);z-index:100;display:flex;justify-content:flex-end}
.detail{width:480px;background:#fff;border-left:1px solid #e0e0e0;display:flex;flex-direction:column;overflow:hidden;animation:slin .18s ease;box-shadow:-6px 0 24px rgba(0,0,0,.08)}
@keyframes slin{from{transform:translateX(100%)}to{transform:translateX(0)}}
.det-hdr{padding:17px 17px 13px;border-bottom:1px solid #f0f0f0;flex-shrink:0}
.det-close{float:right;background:none;border:none;color:#bbb;cursor:pointer;font-size:22px;line-height:1;padding:0}
.det-close:hover{color:#111}
.det-title{background:none;border:none;font-size:18px;font-weight:800;color:#111;width:100%;outline:none;padding:0;letter-spacing:-.3px}
.det-title::placeholder{color:#ccc}
.det-sub{font-size:11px;color:#aaa;margin-top:3px;font-weight:500}
.det-tabs{display:flex;border-bottom:1px solid #f0f0f0;flex-shrink:0}
.det-tab{padding:9px 16px;font-size:12px;font-weight:600;color:#aaa;cursor:pointer;border-bottom:2px solid transparent;transition:all .13s}
.det-tab:hover{color:#555}
.det-tab.active{color:#111;border-bottom-color:#111}
.det-body{flex:1;overflow-y:auto;padding:14px 16px}
.det-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:13px}
.det-field .det-label{font-size:9px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:#aaa;margin-bottom:5px}
.det-in{background:#f8f8f8;border:1px solid #e5e5e5;border-radius:6px;padding:7px 10px;color:#111;font-size:13px;width:100%;outline:none;font-weight:500}
.det-in:focus{border-color:#111;background:#fff}
.det-notes{background:#f8f8f8;border:1px solid #e5e5e5;border-radius:7px;padding:9px 11px;color:#333;font-size:13px;width:100%;min-height:100px;resize:vertical;outline:none;line-height:1.6;font-weight:400}
.det-notes:focus{border-color:#111;background:#fff}
.det-div{border:none;border-top:1px solid #f0f0f0;margin:13px 0}

/* TIMER */
.timer-display{font-size:26px;font-weight:800;font-family:'DM Mono',monospace;color:#111;letter-spacing:.05em}
.timer-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:7px;border:1.5px solid;cursor:pointer;font-size:12px;font-weight:700;transition:all .13s;text-transform:uppercase;letter-spacing:.04em}
.time-log-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #f0f0f0;font-size:12px;color:#555}
.tl-del{background:none;border:none;color:#ccc;cursor:pointer;font-size:14px;padding:0;line-height:1;margin-left:auto}
.tl-del:hover{color:#e53935}
.tl-hrs{font-family:'DM Mono',monospace;font-weight:700;color:#333;min-width:38px}

/* MODALS */
.modal-ov{position:absolute;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border:1px solid #ddd;border-radius:12px;padding:22px;width:440px;box-shadow:0 12px 40px rgba(0,0,0,.15)}
.modal h3{font-size:16px;font-weight:800;color:#111;margin-bottom:14px;letter-spacing:-.2px}
.modal label{font-size:9px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:#aaa;display:block;margin-bottom:4px;margin-top:10px}

// ── Simple Components ──────────────────────────────────────────────────────
function SBadge({v,t='status',onClick}){return<span className="sbadge" style={sStyle(v,t)} onClick={onClick}>{v||'— set'}</span>}
function SPop({t,cur,onSel,onClose}){const ref=useRef();useEffect(()=>{const h=e=>{if(ref.current&&!ref.current.contains(e.target))onClose()};setTimeout(()=>document.addEventListener('mousedown',h),0);return()=>document.removeEventListener('mousedown',h)},[]);return<div className="pop" ref={ref}>{sOpts(t).map(o=><div key={o.l} className="pop-item" onClick={()=>{onSel(o.l);onClose()}}><span className="pop-dot" style={{background:o.c}}/>{o.l}{o.l===cur&&<span style={{marginLeft:'auto',fontSize:10,color:'#bbb'}}>✓</span>}</div>)}</div>}
function PPop({cur,onSel,onClose}){const ref=useRef();useEffect(()=>{const h=e=>{if(ref.current&&!ref.current.contains(e.target))onClose()};setTimeout(()=>document.addEventListener('mousedown',h),0);return()=>document.removeEventListener('mousedown',h)},[]);return<div className="pop" ref={ref}><div className="pop-item" style={{color:'#bbb'}} onClick={()=>{onSel('');onClose()}}>— unassign</div>{PEOPLE.map(p=><div key={p} className="pop-item" onClick={()=>{onSel(p);onClose()}}><span className="pav" style={{background:pColor(p),width:20,height:20,fontSize:8}}>{inits(p)}</span>{p}{p===cur&&<span style={{marginLeft:'auto',fontSize:10,color:'#bbb'}}>✓</span>}</div>)}</div>}

function Cell({col,value,onChange}){
  const [ed,setEd]=useState(false);const [ev,setEv]=useState('');const [pop,setPop]=useState(false);
  const start=()=>{setEv(value??'');setEd(true)};const commit=()=>{setEd(false);onChange(ev)};
  if(col.type==='status'||col.type==='priority')return<div style={{position:'relative'}}><SBadge v={value} t={col.type} onClick={e=>{e.stopPropagation();setPop(!pop)}}/>{pop&&<div style={{position:'absolute',top:'100%',left:0,zIndex:200}}><SPop t={col.type} cur={value} onSel={onChange} onClose={()=>setPop(false)}/></div>}</div>;
  if(col.type==='person')return<div style={{position:'relative'}}>{value?<span className="pchip" onClick={e=>{e.stopPropagation();setPop(!pop)}}><span className="pav" style={{background:pColor(value),width:22,height:22}}>{inits(value)}</span><span>{value}</span></span>:<span className="muted tcell" onClick={e=>{e.stopPropagation();setPop(!pop)}}>+ assign</span>}{pop&&<div style={{position:'absolute',top:'100%',left:0,zIndex:200}}><PPop cur={value} onSel={onChange} onClose={()=>setPop(false)}/></div>}</div>;
  if(col.type==='date'){if(ed)return<input type="date" className="ii" style={{width:118}} value={ev} onChange={e=>setEv(e.target.value)} onBlur={commit} autoFocus/>;return<span className="dcell" onClick={start}>{fmtD(value)||<span className="muted">Set date</span>}</span>;}
  if(col.type==='currency'){if(ed)return<input className="ii" style={{width:84}} value={ev} onChange={e=>setEv(e.target.value)} onBlur={commit} onKeyDown={e=>e.key==='Enter'&&commit()} autoFocus/>;return<span className="ncell" onClick={start}>{fmtCur(value)||<span className="muted">$0</span>}</span>;}
  if(col.type==='number'){if(ed)return<input className="ii" style={{width:66}} value={ev} onChange={e=>setEv(e.target.value)} onBlur={commit} onKeyDown={e=>e.key==='Enter'&&commit()} autoFocus/>;return<span className="ncell" onClick={start}>{value!==''&&value!=null?value:<span className="muted">0</span>}</span>;}
  if(ed)return<input className="ii" value={ev} onChange={e=>setEv(e.target.value)} onBlur={commit} onKeyDown={e=>e.key==='Enter'&&commit()} autoFocus/>;
  return<span className="tcell" onClick={start}>{value||<span className="muted">—</span>}</span>;
}

function TableView({board,onUpdate,onSelect}){
  const [addingG,setAddingG]=useState(false);const [newG,setNewG]=useState('');const [showC,setShowC]=useState(false);const [edName,setEdName]=useState(null);
  const toggle=gid=>onUpdate(p=>({...p,groups:p.groups.map(g=>g.id===gid?{...g,collapsed:!g.collapsed}:g)}));
  const updCell=(gid,iid,cid,v)=>onUpdate(p=>({...p,groups:p.groups.map(g=>g.id===gid?{...g,items:g.items.map(i=>i.id===iid?{...i,values:{...i.values,[cid]:v}}:i)}:g)}));
  const updName=(gid,iid,name)=>onUpdate(p=>({...p,groups:p.groups.map(g=>g.id===gid?{...g,items:g.items.map(i=>i.id===iid?{...i,name}:i)}:g)}));
  const addItem=gid=>{const it={id:uid(),name:'New item',notes:'',startDate:'',timeLogs:[],values:{}};onUpdate(p=>({...p,groups:p.groups.map(g=>g.id===gid?{...g,items:[...g.items,it]}:g)}))};
  const addGroup=()=>{if(!newG.trim())return;const g={id:uid(),name:newG,color:GCOLS[board.groups.length%GCOLS.length],collapsed:false,items:[]};onUpdate(p=>({...p,groups:[...p.groups,g]}));setNewG('');setAddingG(false)};
  const addCol=(name,type)=>{const c={id:uid(),name,type};onUpdate(p=>({...p,columns:[...p.columns,c]}));setShowC(false)};
  const totals=useMemo(()=>{const t={};board.columns.forEach(c=>{if(c.type==='number'||c.type==='currency'){let s=0;board.groups.forEach(g=>g.items.forEach(i=>{const v=parseFloat(i.values[c.id]);if(!isNaN(v))s+=v}));t[c.id]={s,t:c.type,n:c.name}}});return t},[board]);
  return(<div>
    {board.groups.map(g=>(<div key={g.id} className="group-block">
      <div className="group-header" onClick={()=>toggle(g.id)}>
        <span className="g-chev" style={{transform:g.collapsed?'rotate(0)':'rotate(90deg)'}}>▶</span>
        <span className="g-dot" style={{background:g.color}}/><span className="g-name">{g.name}</span><span className="g-cnt">{g.items.length} item{g.items.length!==1?'s':''}</span>
      </div>
      {!g.collapsed&&(<div className="tbl-wrap">
        <div className="tbl-head"><div className="th th-name">Item</div>{board.columns.map(c=><div key={c.id} className="th th-col">{c.name}</div>)}<div className="th-add" onClick={()=>setShowC(true)}>+ Add column</div></div>
        {g.items.map(item=>(<div key={item.id} className="tbl-row">
          <div className="td-name">{edName===item.id?<input className="ni" value={item.name} autoFocus onChange={e=>updName(g.id,item.id,e.target.value)} onBlur={()=>setEdName(null)} onKeyDown={e=>e.key==='Enter'&&setEdName(null)} onClick={e=>e.stopPropagation()}/>:
            <><span className="td-nm-txt" onDoubleClick={e=>{e.stopPropagation();setEdName(item.id)}} onClick={()=>onSelect(board.id,g.id,item.id)}>{item.name}</span>
            {item.notes&&<span style={{fontSize:9,color:'#ccc'}}>📝</span>}
            {item.timeLogs&&item.timeLogs.length>0&&<span style={{fontSize:9,color:'#ccc'}}>⏱</span>}</>}
          </div>
          {board.columns.map(c=><div key={c.id} className="td-col"><Cell col={c} value={item.values[c.id]} onChange={v=>updCell(g.id,item.id,c.id,v)}/></div>)}
        </div>))}
        <div className="add-row"><div className="add-row-btn" onClick={()=>addItem(g.id)}>+ Add item</div></div>
        {Object.keys(totals).length>0&&<div className="sum-row">{Object.values(totals).map(t=><div key={t.n}>{t.n}: <b>{t.t==='currency'?fmtCur(t.s):t.s}</b></div>)}</div>}
      </div>)}
    </div>))}
    {addingG?<div style={{display:'flex',gap:7,alignItems:'center',marginTop:8}}>
      <input className="ni" style={{maxWidth:200}} placeholder="Group name..." value={newG} onChange={e=>setNewG(e.target.value)} autoFocus onKeyDown={e=>{if(e.key==='Enter')addGroup();if(e.key==='Escape')setAddingG(false)}}/>
      <button className="btn-p" onClick={addGroup} style={{padding:'5px 12px',fontSize:12}}>Add</button>
      <button className="btn-g" onClick={()=>setAddingG(false)} style={{padding:'5px 10px',fontSize:12}}>Cancel</button>
    </div>:<span style={{fontSize:13,color:'#bbb',cursor:'pointer',display:'block',marginTop:10,fontWeight:600}} onClick={()=>setAddingG(true)}>+ Add group</span>}
    {showC&&<AddColModal onAdd={addCol} onClose={()=>setShowC(false)}/>}
  </div>);
}

// ── CalendarView ───────────────────────────────────────────────────────────
function CalendarView({board,onSelect}){
  const now=new Date();const [yr,setYr]=useState(now.getFullYear());const [mo,setMo]=useState(now.getMonth());
  const dcol=board.columns.find(c=>c.type==='date');const todayStr=today();
  const allItems=useMemo(()=>board.groups.flatMap(g=>g.items.map(i=>({...i,gid:g.id}))).filter(i=>{if(!dcol)return false;const d=i.values[dcol.id];if(!d)return false;const dt=new Date(d+'T00:00:00');return dt.getFullYear()===yr&&dt.getMonth()===mo}),[board,yr,mo,dcol]);
  const itemsByDay=useMemo(()=>{const m={};allItems.forEach(i=>{const d=new Date(i.values[dcol.id]+'T00:00:00').getDate();if(!m[d])m[d]=[];m[d].push(i)});return m},[allItems]);
  const firstDay=new Date(yr,mo,1).getDay();const daysInMonth=new Date(yr,mo+1,0).getDate();const daysInPrev=new Date(yr,mo,0).getDate();
  const cells=[];for(let i=firstDay-1;i>=0;i--)cells.push({day:daysInPrev-i,other:true});for(let d=1;d<=daysInMonth;d++)cells.push({day:d,other:false});const rem=42-cells.length;for(let d=1;d<=rem;d++)cells.push({day:d,other:true});
  const prevMo=()=>{if(mo===0){setYr(y=>y-1);setMo(11)}else setMo(m=>m-1)};const nextMo=()=>{if(mo===11){setYr(y=>y+1);setMo(0)}else setMo(m=>m+1)};
  const isToday=(d,other)=>{if(other)return false;return new Date(yr,mo,d).toISOString().split('T')[0]===todayStr};
  const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  if(!dcol)return<div className="empty"><h3>No date column</h3><p>Add a Date column to use Calendar view.</p></div>;
  return(<div>
    <div className="cal-nav">
      <button className="cal-nav-btn" onClick={prevMo}>‹</button>
      <span className="cal-month">{fmtM(`${yr}-${String(mo+1).padStart(2,'0')}-01`)}</span>
      <button className="cal-nav-btn" onClick={nextMo}>›</button>
      <span style={{fontSize:12,color:'#aaa',marginLeft:8,fontWeight:600}}>{allItems.length} items · Google Cal sync coming soon</span>
    </div>
    <div className="cal-grid">
      {DAYS.map(d=><div key={d} className="cal-day-hdr">{d}</div>)}
      {cells.map((cell,i)=>{const items=(!cell.other&&itemsByDay[cell.day])||[];const tod=isToday(cell.day,cell.other);return(
        <div key={i} className={`cal-cell${tod?' today':''}${cell.other?' other-month':''}`}>
          <div className={`cal-date${tod?' today-num':''}`}>{cell.day}</div>
          {items.slice(0,3).map(item=>{const st=item.values[board.columns.find(c=>c.type==='status')?.id];const c2=st?sStyle(st).color:'#5c6bc0';return<span key={item.id} className="cal-chip" style={{background:c2+'18',color:c2,border:`1px solid ${c2}30`}} onClick={()=>onSelect(board.id,item.gid,item.id)} title={item.name}>{item.name}</span>;})}
          {items.length>3&&<div className="cal-more">+{items.length-3} more</div>}
        </div>
      );})}
    </div>
  </div>);
}

// ── Board GanttView ────────────────────────────────────────────────────────
function GanttView({board,onSelect}){
  const dcol=board.columns.find(c=>c.type==='date');const [offsetW,setOffsetW]=useState(0);
  const WEEKS=12;const PX_WEEK=110;const todayD=today();
  const startDate=useMemo(()=>addDays(todayD,-14+offsetW*7),[offsetW,todayD]);
  const totalPx=WEEKS*PX_WEEK;const dToX=d=>daysBetween(startDate,d)*(PX_WEEK/7);const todayX=dToX(todayD);
  const weeksArr=useMemo(()=>Array.from({length:WEEKS},(_,i)=>{const d=addDays(startDate,i*7);const dt=new Date(d+'T00:00:00');return dt.toLocaleDateString('en-AU',{day:'numeric',month:'short'})}),[startDate]);
  const allItems=board.groups.flatMap(g=>g.items.map(i=>({...i,gid:g.id,gname:g.name,gcolor:g.color})));
  const withDates=allItems.filter(i=>dcol&&i.values[dcol.id]);
  const grouped=board.groups.map(g=>({...g,items:withDates.filter(i=>i.gid===g.id)})).filter(g=>g.items.length>0);
  const getBar=i=>{const ed=dcol&&i.values[dcol.id];if(!ed)return null;const sd=i.startDate||addDays(ed,-7);const x1=Math.max(0,dToX(sd));const x2=Math.min(totalPx,dToX(ed));const w=x2-x1;if(w<=0)return null;const st=i.values[board.columns.find(c=>c.type==='status')?.id];const c2=st?sStyle(st).color:'#5c6bc0';return{x:x1,w,c:c2}};
  if(!dcol)return<div className="empty"><h3>No date column</h3></div>;
  if(withDates.length===0)return<div className="empty"><h3>No items with dates</h3></div>;
  return(<div>
    <div className="gantt-nav" style={{display:'flex',gap:8,marginBottom:14}}>
      <button className="mg-nav-btn" onClick={()=>setOffsetW(o=>o-2)}>‹ Earlier</button>
      <span style={{fontSize:13,color:'#666',fontWeight:600}}>{weeksArr[0]} — {weeksArr[WEEKS-1]}</span>
      <button className="mg-nav-btn" onClick={()=>setOffsetW(o=>o+2)}>Later ›</button>
      <button className="mg-nav-btn" onClick={()=>setOffsetW(0)} style={{fontSize:11}}>Today</button>
    </div>
    <div className="gantt-wrap" style={{overflowX:'auto'}}><div style={{minWidth:210+totalPx}}>
      <div className="gantt-head"><div className="gantt-label-col">Item</div><div style={{display:'flex',minWidth:totalPx}}>{weeksArr.map((w,i)=><div key={i} className="gantt-week" style={{flex:`0 0 ${PX_WEEK}px`}}>{w}</div>)}</div></div>
      {grouped.map(g=>(<div key={g.id}>
        <div className="gantt-grp-hdr"><div className="gantt-grp-label" style={{display:'flex',alignItems:'center',gap:6}}><span style={{width:7,height:7,borderRadius:'50%',background:g.color,display:'inline-block'}}/>{g.name}</div><div style={{flex:1,background:'#f8f8f8',minWidth:totalPx}}/></div>
        {g.items.map(item=>{const bar=getBar(item);return(<div key={item.id} className="gantt-row">
          <div className="gantt-row-label" onClick={()=>onSelect(board.id,item.gid,item.id)}>{item.name}</div>
          <div className="gantt-timeline" style={{minWidth:totalPx}}>
            {todayX>=0&&todayX<=totalPx&&<div className="gantt-today-line" style={{left:todayX}}/>}
            {bar&&<div className="gantt-bar" style={{left:bar.x,width:bar.w,background:bar.c+'22',border:`1px solid ${bar.c}55`,color:bar.c}} onClick={()=>onSelect(board.id,item.gid,item.id)}>{bar.w>60?item.name:''}</div>}
          </div>
        </div>);})}
      </div>))}
    </div></div>
  </div>);
}
